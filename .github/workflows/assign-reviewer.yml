name: assign-reviewer

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    # Skip drafts. Author exclusion is handled in the script so a maintainer's
    # own PR still triggers the job and gets the *other* maintainer as reviewer.
    if: github.event.pull_request.draft == false
    steps:
      - name: Request review from maintainers
        uses: actions/github-script@v7
        with:
          script: |
            const MAINTAINERS = ['Lee-Dongwook', 'Avaneesh635', 'Adityai1411'];
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            // Never ask someone to review their own PR.
            const candidates = MAINTAINERS.filter((login) => login !== author);
            if (candidates.length === 0) {
              core.info(`No reviewers to request (author "${author}" is the only maintainer).`);
              return;
            }

            // Request each reviewer independently. requestReviewers is atomic per call,
            // so a single non-collaborator (e.g. a pending invite that 422s) would sink
            // the whole batch and assign nobody. Per-reviewer calls isolate that failure.
            const requested = [];
            const skipped = [];
            for (const login of candidates) {
              try {
                await github.rest.pulls.requestReviewers({ owner, repo, pull_number, reviewers: [login] });
                requested.push(login);
              } catch (error) {
                core.info(`Skipping "${login}": ${error.status} — ${error.message}`);
                skipped.push(login);
              }
            }

            core.info(`Requested review from: ${requested.join(', ') || '(none)'}`);
            if (skipped.length > 0) {
              core.info(`Skipped (not assignable, likely pending invite): ${skipped.join(', ')}`);
            }
