name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.head_ref || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Auto-format
        run: uv run ruff format .

      - name: Commit formatting changes
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format code with ruff"
          file_pattern: "*.py"

      - name: Verify formatting changes were committed
        run: git diff --exit-code -- "*.py"

      - name: Typecheck
        run: uv run pyright

      - name: Test with coverage
        run: uv run pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  examples-repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: examples/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: examples/pnpm-lock.yaml

      - name: Install Playwright demo deps
        working-directory: examples
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        working-directory: examples
        run: pnpm exec playwright install chromium

      - name: Verify demo is green on a clean checkout
        working-directory: examples
        run: pnpm exec playwright test scenarios/id-rename

      - name: Verify applying the change breaks the selector
        working-directory: examples
        run: |
          git apply scenarios/id-rename/change.patch
          set +e
          pnpm exec playwright test scenarios/id-rename
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "Expected scenarios/id-rename to fail on #submit-btn after applying change.patch"
            exit 1
          fi
          echo "Demo correctly reproduces the broken-selector failure"

  check-secret:
    runs-on: ubuntu-latest
    outputs:
      has-key: ${{ steps.check.outputs.has-key }}
    steps:
      - id: check
        env:
          E2E_HEALER_NVIDIA_API_KEY: ${{ secrets.E2E_HEALER_NVIDIA_API_KEY }}
        run: |
          if [ -n "$E2E_HEALER_NVIDIA_API_KEY" ]; then
            echo "has-key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-key=false" >> "$GITHUB_OUTPUT"
          fi

  examples-heal:
    runs-on: ubuntu-latest
    needs: [check, examples-repro, check-secret]
    if: needs.check-secret.outputs.has-key == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync --extra dev

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: examples/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: examples/pnpm-lock.yaml

      - name: Install Playwright demo deps
        working-directory: examples
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        working-directory: examples
        run: pnpm exec playwright install chromium

      - name: Apply the breaking change
        working-directory: examples
        run: git apply scenarios/id-rename/change.patch

      - name: Capture failing Playwright log
        working-directory: examples
        run: |
          set +e
          pnpm exec playwright test scenarios/id-rename 2>&1 | tee scenarios/id-rename/playwright.log
          set -e

      - name: Dry-run heal against demo
        working-directory: examples
        env:
          E2E_HEALER_NVIDIA_API_KEY: ${{ secrets.E2E_HEALER_NVIDIA_API_KEY }}
        run: uv run e2e-healer scenarios/id-rename/spec.ts --log scenarios/id-rename/playwright.log --diff scenarios/id-rename/change.patch --dry-run
